db = "/app/strfry-db/"

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 64
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 4096
    realIpHeader = "x-real-ip"

    info {
        name = "anarchos"
        description = "Anarchos community relay"
        contact = ""
    }

    maxWebsocketPayloadSize = 98304
    maxReqFilterSize = 5
    autoPingSeconds = 45
    enableTcpKeepalive = true
    queryTimesliceBudgetMicroseconds = 5000
    maxFilterLimit = 100
    maxTagsPerFilter = 3
    maxFilterLimitCount = 10000
    maxSubsPerConnection = 10
    maxPendingOutboundBytes = 1048576

    writePolicy {
        plugin = "/usr/local/bin/strfry-policy"
        timeoutSeconds = 2
    }

    compression {
        enabled = false
        slidingWindow = false
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 1
    }

    negentropy {
        enabled = false
        maxSyncEvents = 10000
    }

    filterValidation {
        enabled = true
        maxFiltersPerReq = 3
        minFiltersPerReq = 1
        maxKindsPerFilter = 6
        allowedKinds = "0,1,5,7,1111,30078"
        requireAuthorOrTag = false
    }
}
